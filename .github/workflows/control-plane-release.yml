name: Promote control-plane release

on:
  push:
    tags: ['v*']

concurrency:
  group: favn-control-plane-registry
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: ghcr.io/eirhop/favn-control-plane

jobs:
  promote:
    name: Promote tested commit image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: write
      packages: write
      attestations: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Validate release tag and revision
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=${GITHUB_REF_NAME#v}
          elixir -e 'case Version.parse(hd(System.argv())) do {:ok, _} -> :ok; :error -> System.halt(1) end' "$version"
          tagged_sha=$(git rev-parse --verify 'HEAD^{commit}')
          [[ "$tagged_sha" =~ ^[0-9a-f]{40,64}$ ]]
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$tagged_sha" origin/main
          successful_runs=$(gh run list --workflow CI --branch main --commit "$tagged_sha" --event push --status success --json databaseId --jq 'length')
          test "$successful_runs" -ge 1
          echo "tagged_sha=$tagged_sha" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Promote commit image without rebuilding
        id: promote
        run: |
          source_digest=$(docker buildx imagetools inspect "$IMAGE_REPOSITORY:sha-${{ steps.release.outputs.tagged_sha }}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          [[ "$source_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          docker buildx imagetools create \
            --prefer-index=false \
            --tag "$IMAGE_REPOSITORY:$GITHUB_REF_NAME" \
            "$IMAGE_REPOSITORY@$source_digest"
          echo "source_digest=$source_digest" >> "$GITHUB_OUTPUT"

      - name: Resolve promoted digest
        id: image
        run: |
          digest=$(docker buildx imagetools inspect "$IMAGE_REPOSITORY:$GITHUB_REF_NAME" --format '{{json .Manifest.Digest}}' | tr -d '"')
          test "$digest" = "${{ steps.promote.outputs.source_digest }}"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Verify provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify "oci://$IMAGE_REPOSITORY@${{ steps.image.outputs.digest }}" --repo "${{ github.repository }}" --predicate-type https://slsa.dev/provenance/v1

      - name: Scan exact release image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ env.IMAGE_REPOSITORY }}@${{ steps.image.outputs.digest }}
          fail-build: true
          severity-cutoff: high
          only-fixed: false
          grype-version: v0.116.0
          config: security/control-plane-grype.yaml

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Control-plane deployment reference: \`$IMAGE_REPOSITORY@${{ steps.image.outputs.digest }}\`"
          args=("$GITHUB_REF_NAME" --verify-tag --generate-notes --notes "$notes")
          if [[ "${GITHUB_REF_NAME#v}" == *-* ]]; then args+=(--prerelease); fi
          gh release create "${args[@]}"
