name: Control-plane security scan

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  attestations: read

env:
  IMAGE_REPOSITORY: ghcr.io/eirhop/favn-control-plane

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve current digest
        id: image
        run: |
          digest=$(docker buildx imagetools inspect "$IMAGE_REPOSITORY:main" --format '{{json .Manifest.Digest}}' | tr -d '"')
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Verify provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify "oci://$IMAGE_REPOSITORY@${{ steps.image.outputs.digest }}" --repo "${{ github.repository }}" --predicate-type https://slsa.dev/provenance/v1

      - uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ env.IMAGE_REPOSITORY }}@${{ steps.image.outputs.digest }}
          fail-build: true
          severity-cutoff: high
          only-fixed: false
          grype-version: v0.116.0
          config: security/control-plane-grype.yaml
