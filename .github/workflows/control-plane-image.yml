name: Control-plane image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: control-plane-image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: ghcr.io/eirhop/favn-control-plane
  LOCAL_IMAGE: favn-control-plane:candidate

jobs:
  qualify:
    name: Build and qualify direct repository image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Compute immutable build timestamp
        id: metadata
        run: echo "timestamp=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build candidate once from repository root
        run: |
          docker build \
            --file rel/control_plane/Dockerfile \
            --build-arg FAVN_SOURCE_REVISION="${GITHUB_SHA}" \
            --build-arg FAVN_BUILD_TIMESTAMP="${{ steps.metadata.outputs.timestamp }}" \
            --tag "$LOCAL_IMAGE" \
            .

      - name: Authenticate to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push the exact candidate under its immutable commit tag
        if: github.event_name != 'pull_request'
        id: publish
        run: |
          commit_ref="$IMAGE_REPOSITORY:sha-$GITHUB_SHA"
          docker tag "$LOCAL_IMAGE" "$commit_ref"
          docker push "$commit_ref"
          digest=$(docker buildx imagetools inspect "$commit_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "qualified_image=$IMAGE_REPOSITORY@$digest" >> "$GITHUB_OUTPUT"

      - name: Select qualification target
        id: target
        env:
          PUBLISHED_IMAGE: ${{ steps.publish.outputs.qualified_image }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == pull_request ]]; then
            image="$LOCAL_IMAGE"
          else
            image="$PUBLISHED_IMAGE"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Verify exact image contents and launcher
        run: scripts/control_plane_image_contract.sh "${{ steps.target.outputs.image }}"

      - name: Scan exact image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.target.outputs.image }}
          fail-build: true
          severity-cutoff: high
          only-fixed: false
          grype-version: v0.116.0
          config: security/control-plane-grype.yaml

      - name: Generate exact image SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.target.outputs.image }}
          format: spdx-json
          output-file: control-plane.spdx.json
          upload-artifact: false

      - name: Attest exact image build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest exact image SBOM
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          sbom-path: control-plane.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Promote qualified digest to main
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create \
            --prefer-index=false \
            --tag "$IMAGE_REPOSITORY:main" \
            "$IMAGE_REPOSITORY@${{ steps.publish.outputs.digest }}"
          main_digest=$(docker buildx imagetools inspect "$IMAGE_REPOSITORY:main" --format '{{json .Manifest.Digest}}' | tr -d '"')
          test "$main_digest" = "${{ steps.publish.outputs.digest }}"

      - name: Record deployment reference
        if: github.event_name != 'pull_request'
        run: |
          echo "Deployment reference: \`$IMAGE_REPOSITORY@${{ steps.publish.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
