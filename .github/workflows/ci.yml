name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-run-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.filter.outputs.tests }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Detect test-affecting changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            tests:
              - '**'
              - '!**/*.md'
              - '!**/README'
              - '!**/README.*'
              - '!docs/**'
              - '!apps/favn/guides/**'

  quick-checks:
    name: Quick checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    env:
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: '1.20.2'
          otp-version: '29.0.3'

      - name: Check test tag coverage
        run: elixir scripts/check_test_tag_tiers.exs

      - name: Test umbrella runner
        run: elixir scripts/umbrella_test_runner_test.exs

      - name: Test control-plane qualification routing
        run: elixir scripts/control_plane_qualification_test.exs

      - name: Check removed asset DSL forms
        run: elixir scripts/check_no_legacy_asset_dsl.exs

      - name: Install Hex and Rebar
        run: |
          mix local.hex 2.5.1 --force
          mix local.rebar rebar3 https://github.com/erlang/rebar3/releases/download/3.27.0/rebar3 --sha512 0d00494d849fdc521a55142278d1f6ba552954fbd65b80d40df8022f594f05d6c99ed1d731bc263691a04176e11d4c6e126c56ba20dca19c5e42d4ffab2e7e36 --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run quick Elixir lint and security checks
        run: scripts/check_elixir_static_security.sh quick

      - name: Audit Hex dependencies
        run: mix hex.audit

      - name: Audit dependency advisories
        run: mix deps.audit

  fast-tests:
    name: Fast tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    services:
      postgres:
        image: postgres@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
        env:
          POSTGRES_DB: favn_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d favn_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      FAVN_DATABASE_URL: ecto://postgres:postgres@127.0.0.1:5432/favn_test
      FAVN_RUNTIME_INPUT_PIN_KEY: 0123456789abcdef0123456789abcdef
      FAVN_RUNTIME_INPUT_PIN_KEY_VERSION: '1'
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: '1.20.2'
          otp-version: '29.0.3'

      - name: Install Hex and Rebar
        run: |
          mix local.hex 2.5.1 --force
          mix local.rebar rebar3 https://github.com/erlang/rebar3/releases/download/3.27.0/rebar3 --sha512 0d00494d849fdc521a55142278d1f6ba552954fbd65b80d40df8022f594f05d6c99ed1d731bc263691a04176e11d4c6e126c56ba20dca19c5e42d4ffab2e7e36 --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Migrate PostgreSQL Storage V2
        run: mix favn.postgres.migrate

      - name: Build Phoenix assets
        run: mix do --app favn_view cmd mix assets.build

      - name: Test
        run: mix test --no-compile --timeout 1200000

      - name: Install pinned DuckDB ADBC driver
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/duckdb/duckdb/releases/download/v1.5.3/libduckdb-linux-amd64.zip \
            --output "$RUNNER_TEMP/libduckdb-linux-amd64.zip"
          echo "0a926eba5bce0abc0010f4b9109133e4440cb74e97bd10fd2d0fc2a721621b05  $RUNNER_TEMP/libduckdb-linux-amd64.zip" \
            | sha256sum --check
          mkdir -p "$RUNNER_TEMP/duckdb"
          unzip -q "$RUNNER_TEMP/libduckdb-linux-amd64.zip" libduckdb.so -d "$RUNNER_TEMP/duckdb"

      - name: Test native multi-statement DuckDB ADBC bootstrap
        env:
          DUCKDB_ADBC_DRIVER: ${{ runner.temp }}/duckdb/libduckdb.so
          FAVN_DUCKDB_ADBC_INTEGRATION: '1'
        run: >-
          mix do --app favn_duckdb_adbc cmd mix test --no-compile
          test/sql/adapter/duckdb_adbc_integration_test.exs

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    env:
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: '1.20.2'
          otp-version: '29.0.3'

      - name: Install Hex and Rebar
        run: |
          mix local.hex 2.5.1 --force
          mix local.rebar rebar3 https://github.com/erlang/rebar3/releases/download/3.27.0/rebar3 --sha512 0d00494d849fdc521a55142278d1f6ba552954fbd65b80d40df8022f594f05d6c99ed1d731bc263691a04176e11d4c6e126c56ba20dca19c5e42d4ffab2e7e36 --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run whole-umbrella Dialyzer
        run: scripts/check_elixir_static_security.sh dialyzer

  acceptance-tests:
    name: Acceptance tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    services:
      postgres:
        image: postgres@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
        env:
          POSTGRES_DB: favn_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d favn_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      FAVN_DATABASE_URL: ecto://postgres:postgres@127.0.0.1:5432/favn_test
      FAVN_RUNTIME_INPUT_PIN_KEY: 0123456789abcdef0123456789abcdef
      FAVN_RUNTIME_INPUT_PIN_KEY_VERSION: '1'
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: '1.20.2'
          otp-version: '29.0.3'

      - name: Install Hex and Rebar
        run: |
          mix local.hex 2.5.1 --force
          mix local.rebar rebar3 https://github.com/erlang/rebar3/releases/download/3.27.0/rebar3 --sha512 0d00494d849fdc521a55142278d1f6ba552954fbd65b80d40df8022f594f05d6c99ed1d731bc263691a04176e11d4c6e126c56ba20dca19c5e42d4ffab2e7e36 --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Migrate PostgreSQL Storage V2
        run: mix favn.postgres.migrate

      - name: Run favn_local acceptance tests
        run: mix test.acceptance

  slow-tests:
    name: Slow tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    services:
      postgres:
        image: postgres@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
        env:
          POSTGRES_DB: favn_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d favn_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      FAVN_DATABASE_URL: ecto://postgres:postgres@127.0.0.1:5432/favn_test
      FAVN_RUNTIME_INPUT_PIN_KEY: 0123456789abcdef0123456789abcdef
      FAVN_RUNTIME_INPUT_PIN_KEY_VERSION: '1'
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: '1.20.2'
          otp-version: '29.0.3'

      - name: Install Hex and Rebar
        run: |
          mix local.hex 2.5.1 --force
          mix local.rebar rebar3 https://github.com/erlang/rebar3/releases/download/3.27.0/rebar3 --sha512 0d00494d849fdc521a55142278d1f6ba552954fbd65b80d40df8022f594f05d6c99ed1d731bc263691a04176e11d4c6e126c56ba20dca19c5e42d4ffab2e7e36 --force

      - name: Install PostgreSQL 18 client tools
        run: |
          sudo install -d -m 0755 /usr/share/postgresql-common/pgdg
          curl --fail --location --silent --show-error \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor --yes --output /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] https://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo "$VERSION_CODENAME")-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Migrate PostgreSQL Storage V2
        run: mix favn.postgres.migrate

      - name: Provision local development workspace
        run: >-
          mix favn.postgres.provision_workspace
          --id local-dev --slug local-dev --name "Local Development"

      - name: Run non-acceptance slow tests
        run: mix test.slow

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [changes, quick-checks, fast-tests, dialyzer, acceptance-tests, slow-tests]
    if: always()

    steps:
      - name: Check CI result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          TESTS_CHANGED: ${{ needs.changes.outputs.tests }}
          QUICK_RESULT: ${{ needs.quick-checks.result }}
          FAST_RESULT: ${{ needs.fast-tests.result }}
          DIALYZER_RESULT: ${{ needs.dialyzer.result }}
          ACCEPTANCE_RESULT: ${{ needs.acceptance-tests.result }}
          SLOW_RESULT: ${{ needs.slow-tests.result }}
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "Changes job failed: $CHANGES_RESULT"
            exit 1
          fi

          if [ "$TESTS_CHANGED" != "true" ]; then
            echo "No test-affecting changes; heavy CI skipped."
            exit 0
          fi

          if [ "$QUICK_RESULT" = "success" ] && [ "$FAST_RESULT" = "success" ] && [ "$DIALYZER_RESULT" = "success" ] && [ "$ACCEPTANCE_RESULT" = "success" ] && [ "$SLOW_RESULT" = "success" ]; then
            echo "All CI test slices passed."
            exit 0
          fi

          echo "CI test slice failed: quick=$QUICK_RESULT fast=$FAST_RESULT dialyzer=$DIALYZER_RESULT acceptance=$ACCEPTANCE_RESULT slow=$SLOW_RESULT"
          exit 1
