name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.filter.outputs.tests }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect test-affecting changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tests:
              - 'apps/**'
              - 'config/**'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'mix.exs'
              - 'mix.lock'
              - '.formatter.exs'

  fast-tests:
    name: Fast tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tests == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20.2'
          otp-version: '28.4.2'

      - name: Check test tag coverage
        run: elixir scripts/check_test_tag_tiers.exs

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        env:
          MIX_ENV: test
        run: mix deps.get

      - name: Compile
        env:
          MIX_ENV: test
        run: mix compile --warnings-as-errors

      - name: Build Phoenix assets
        env:
          MIX_ENV: test
        run: mix do --app favn_view cmd mix assets.build

      - name: Test
        env:
          MIX_ENV: test
        run: |
          mix do --app favn_test_support cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_core cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_authoring cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_azure cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_sql_runtime cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_runner cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_orchestrator cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_storage_postgres cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_storage_sqlite cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_duckdb cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_duckdb_adbc cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_local cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser
          mix do --app favn_view cmd mix test --no-compile --exclude acceptance --exclude slow --exclude browser

      - name: Install pinned DuckDB ADBC driver
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/duckdb/duckdb/releases/download/v1.5.3/libduckdb-linux-amd64.zip \
            --output "$RUNNER_TEMP/libduckdb-linux-amd64.zip"
          echo "0a926eba5bce0abc0010f4b9109133e4440cb74e97bd10fd2d0fc2a721621b05  $RUNNER_TEMP/libduckdb-linux-amd64.zip" \
            | sha256sum --check
          mkdir -p "$RUNNER_TEMP/duckdb"
          unzip -q "$RUNNER_TEMP/libduckdb-linux-amd64.zip" libduckdb.so -d "$RUNNER_TEMP/duckdb"

      - name: Test native multi-statement DuckDB ADBC bootstrap
        env:
          DUCKDB_ADBC_DRIVER: ${{ runner.temp }}/duckdb/libduckdb.so
          FAVN_DUCKDB_ADBC_INTEGRATION: '1'
          MIX_ENV: test
        run: >-
          mix do --app favn_duckdb_adbc cmd mix test --no-compile
          test/sql/adapter/duckdb_adbc_integration_test.exs

  acceptance-tests:
    name: Acceptance tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tests == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20.2'
          otp-version: '28.4.2'

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        env:
          MIX_ENV: test
        run: mix deps.get

      - name: Compile
        env:
          MIX_ENV: test
        run: mix compile --warnings-as-errors

      - name: Run favn_local acceptance tests
        env:
          MIX_ENV: test
        run: mix test.acceptance

  slow-tests:
    name: Slow tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tests == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20.2'
          otp-version: '28.4.2'

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        env:
          MIX_ENV: test
        run: mix deps.get

      - name: Compile
        env:
          MIX_ENV: test
        run: mix compile --warnings-as-errors

      - name: Run non-acceptance slow tests
        env:
          MIX_ENV: test
        run: mix test.slow

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [changes, fast-tests, acceptance-tests, slow-tests]
    if: always()

    steps:
      - name: Check CI result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          TESTS_CHANGED: ${{ needs.changes.outputs.tests }}
          FAST_RESULT: ${{ needs.fast-tests.result }}
          ACCEPTANCE_RESULT: ${{ needs.acceptance-tests.result }}
          SLOW_RESULT: ${{ needs.slow-tests.result }}
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "Changes job failed: $CHANGES_RESULT"
            exit 1
          fi

          if [ "$TESTS_CHANGED" != "true" ]; then
            echo "No test-affecting changes; heavy CI skipped."
            exit 0
          fi

          if [ "$FAST_RESULT" = "success" ] && [ "$ACCEPTANCE_RESULT" = "success" ] && [ "$SLOW_RESULT" = "success" ]; then
            echo "All CI test slices passed."
            exit 0
          fi

          echo "CI test slice failed: fast=$FAST_RESULT acceptance=$ACCEPTANCE_RESULT slow=$SLOW_RESULT"
          exit 1
