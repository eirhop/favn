name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fast-tests:
    name: Fast tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.5'
          otp-version: '28.4.2'

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        env:
          MIX_ENV: test
        run: mix deps.get

      - name: Compile
        env:
          MIX_ENV: test
        run: mix compile --warnings-as-errors

      - name: Build Phoenix assets
        env:
          MIX_ENV: test
        run: mix cmd --app favn_view mix assets.build

      - name: Test
        env:
          MIX_ENV: test
        run: mix test.fast

  acceptance-tests:
    name: Acceptance tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.5'
          otp-version: '28.4.2'

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        env:
          MIX_ENV: test
        run: mix deps.get

      - name: Compile
        env:
          MIX_ENV: test
        run: mix compile --warnings-as-errors

      - name: Run favn_local acceptance tests
        env:
          MIX_ENV: test
        run: mix test.acceptance
